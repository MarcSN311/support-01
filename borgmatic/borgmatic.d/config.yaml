repositories:
  - path: ssh://u312159-sub10@u312159-sub10.your-storagebox.de:23/./support-01.borg
    label: storagebox

source_directories:
  - /source/stacks

exclude_patterns:
  - '*/borg-cache'
  - '*/borg-config'
  - '*/.cache'
  - '*/crowdsec/data'             # CrowdSec runtime data, recreatable
  - '*/beszel/data/backups'       # PocketBase auto-backups, redundant
  - '*/ntfy/data/cache'           # ntfy message cache, ephemeral
  # SQLite raw files — dumped consistently via sqlite_databases hook instead
  - '*/forgejo/data/data/forgejo.db'
  - '*/forgejo/data/data/forgejo.db-wal'
  - '*/forgejo/data/data/forgejo.db-shm'
  - '*/uptime-kuma/data/kuma.db'
  - '*/uptime-kuma/data/kuma.db-wal'
  - '*/uptime-kuma/data/kuma.db-shm'
  - '*/ntfy/data/auth/auth.db'
  - '*/beszel/data/data.db'
  - '*/beszel/data/data.db-wal'
  - '*/beszel/data/data.db-shm'
  - '*/beszel/data/auxiliary.db'

sqlite_databases:
  - name: forgejo
    path: /source/stacks/forgejo/data/data/forgejo.db
  - name: uptime-kuma
    path: /source/stacks/uptime-kuma/data/kuma.db
  - name: ntfy-auth
    path: /source/stacks/ntfy/data/auth/auth.db
  - name: beszel
    path: /source/stacks/beszel/data/data.db
  - name: beszel-auxiliary
    path: /source/stacks/beszel/data/auxiliary.db

ssh_command: ssh -p 23 -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new

encryption_passphrase: ${BORG_PASSPHRASE}

ntfy:
  topic: alerts
  server: http://ntfy:80
  access_token: ${NTFY_TOKEN}
  states:
    - start
    - finish
    - fail
  start:
    title: "Backup started"
    message: "support-01 backup running"
    tags: hourglass_flowing_sand
    priority: min
  finish:
    title: "Backup complete"
    message: "support-01 backup succeeded"
    tags: white_check_mark
    priority: default
  fail:
    title: "Backup FAILED"
    message: "support-01 backup failed — check logs"
    tags: rotating_light
    priority: high

keep_daily: 7
keep_weekly: 4
keep_monthly: 6

checks:
  - name: repository
    frequency: 2 weeks

relocated_repo_access_is_ok: true
