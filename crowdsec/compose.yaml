name: crowdsec

services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/base-http-scenarios
      - GID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./data/config:/etc/crowdsec
      - ./data/lib:/var/lib/crowdsec/data
      - traefik-logs:/logs:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true

volumes:
  traefik-logs:
    external: true
